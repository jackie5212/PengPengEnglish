# Project-wide Gradle settings.
# http://www.gradle.org/docs/current/userguide/build_environment.html

# ---------- 构建加速（Daemon + 并行 + 构建缓存）----------
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
# JDK 8+ 已移除 PermGen，不要写 -XX:MaxPermSize（会告警或无效）
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC
# Gradle 8+ 起 configure-on-demand 已弃用；Gradle 9 请勿使用 org.gradle.configureondemand

# Kotlin
kotlin.code.style=official
kotlin.incremental=true

# Android（减少 R 类体积与编译量，需模块内使用自己的 R）
android.nonTransitiveRClass=true

# 需要完全离线时再打开（首次拉依赖必须在线）
# org.gradle.offline=true

# 配置缓存：可再提速；若某插件不兼容可改回 false 或仅 IDE 里关
# org.gradle.configuration-cache=true
# org.gradle.configuration-cache.problems=warn

# 仅编 arm64 时改为 true（减少 NDK/打包开销；x86 模拟器请保持 false）
pengpeng.onlyArm64=false
